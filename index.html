---
layout: default

title: Webpage
nav-title: Home
version: 0.1
---
<h2>Featured post</h2>
<ul>
    {% for post in site.posts limit:1 %}
        <li>
            <h2><a href="{{ post.url }}">{{ post.title }} - {{ post.date | date_to_string }}</a></h2>
            {{ post.excerpt }}
            <img src="{{ post.template-image }}" alt="{{ post.title }} image" width="200px">
        </li>
    {% endfor %}
</ul>

<footer>
    <p>Version: {{page.version}} - {{ site.time | date_to_string }}</p>
    <!-- <p>Copyright © {{ site.time | date: '%Y' }} Jana Nica</p> -->   
</footer>
