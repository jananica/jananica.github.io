---
layout: default
title: Photography Blog
nav-title: Photography Blog
---
<h2>Selected posts on analog photography</h2>

<ul style="display: grid;">
  {% for post in site.posts %}
    <li>
      <div style="display: flex;">
        <h2 style="width: 100%;"><a href="{{ post.url }}">{{ post.title }} - {{ post.date | date_to_string }}
        <img src="{{ post.template-image }}" class="image-preview" alt="{{ post.title }} image" ></a>
        </h2>
      </div>
        {{ post.excerpt }}

      <hr>
    </li>
    
  {% endfor %}
</ul>
